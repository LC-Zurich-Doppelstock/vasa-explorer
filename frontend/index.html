<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasaloppet Data Explorer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Vasaloppet Data Explorer</h1>
        <span>764,830 results from 1922 to 2026</span>
        <button id="settings-btn" onclick="openSettings()">
            <span class="status-dot" id="status-dot"></span>
            Settings
        </button>
    </header>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>API Settings</h2>
            <div class="provider-tabs">
                <button class="provider-tab active" data-provider="anthropic" onclick="switchProvider('anthropic')">Anthropic</button>
                <button class="provider-tab" data-provider="openai" onclick="switchProvider('openai')">OpenAI</button>
            </div>
            <label for="api-key-input">API Key</label>
            <input type="password" id="api-key-input" placeholder="sk-ant-...">
            <p class="key-hint" id="key-hint">Your key is stored locally in your browser and sent directly to Anthropic.</p>
            <label for="model-select">Model</label>
            <div id="model-wrapper">
                <select id="model-select" disabled>
                    <option value="">Enter API key to load models</option>
                </select>
                <p id="model-status" class="key-hint"></p>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
                <button class="btn-save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <div id="chat">
        <div class="welcome">
            <h2>Ask anything about Vasaloppet</h2>
            <p>This tool queries 100+ years of race results using AI-powered data analysis.</p>
            <p id="welcome-hint"></p>
            <div class="examples">
                <button class="example-btn" onclick="askExample(this)">Who won Vasaloppet in 2024?</button>
                <button class="example-btn" onclick="askExample(this)">Plot the number of participants over time</button>
                <button class="example-btn" onclick="askExample(this)">What is the average finish time by decade?</button>
                <button class="example-btn" onclick="askExample(this)">Show DNF rate trends for men vs women</button>
                <button class="example-btn" onclick="askExample(this)">Which nations have the most participants?</button>
            </div>
        </div>
    </div>

    <div id="input-area">
        <div id="input-wrapper">
            <textarea id="question" placeholder="Ask a question about Vasaloppet data..." rows="1"></textarea>
            <button id="send-btn" onclick="sendQuestion()">Kör!</button>
        </div>
    </div>

    <script src="/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
